name: Publish

# Publie le plugin sur le JetBrains Marketplace ET crée une GitHub Release,
# déclenché par un tag de version (ex. v0.5.8). Chaque tag = une release
# publique intentionnelle.
#
# Prérequis : secret JETBRAINS_MARKETPLACE_TOKEN (Marketplace → My Tokens).
# Flux type : bumper `version` dans build.gradle.kts → commit →
#   git tag v0.5.8 && git push origin v0.5.8
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# contents: write pour créer la GitHub Release. Le token Marketplace, lui,
# passe par un secret dédié (PUBLISH_TOKEN), jamais par le GITHUB_TOKEN.
permissions:
  contents: write        # créer la GitHub Release
  id-token: write        # signer l'attestation de provenance (OIDC)
  attestations: write    # écrire l'attestation de build

# Sérialise les publications, mais n'annule JAMAIS une publication en cours
# (job critique non interruptible : un publishPlugin à moitié fait ne doit pas
# être tué). Les runs supplémentaires attendent leur tour.
concurrency:
  group: publish-marketplace
  cancel-in-progress: false

jobs:
  publish:
    name: Publier (Marketplace + GitHub Release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java + Gradle
        uses: ./.github/actions/setup-java-gradle

      # Garde-fou : le tag (sans "v") doit correspondre à la version déclarée
      # dans build.gradle.kts, pour éviter de publier une version incohérente.
      # Ignoré lors d'un déclenchement manuel (pas de tag).
      - name: Vérifier la cohérence tag / version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILE_VERSION=$(grep -oE 'version = "[^"]+"' build.gradle.kts | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          TAG_VERSION="${TAG#v}"
          echo "Tag: $TAG_VERSION  |  build.gradle.kts: $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Le tag ($TAG_VERSION) ne correspond pas à la version de build.gradle.kts ($FILE_VERSION)."
            exit 1
          fi

      - name: Tests + vérification (ne publie pas si ça casse)
        run: ./gradlew test verifyPluginConfiguration

      # Build PUIS signature, dans cet ordre et AVANT l'attestation : c'est
      # l'artefact signé qui part sur le Marketplace, donc c'est lui qui doit
      # être attesté, sinon le zip téléchargé par un utilisateur n'aurait pas
      # l'empreinte couverte par l'attestation. signPlugin est sauté si les
      # secrets de signature ne sont pas configurés (cf. build.gradle.kts).
      # verifyPluginSignature relit l'archive signée et valide la signature
      # contre le certificat : une clé mal formée ou dépareillée fait échouer
      # la release ici, avant toute publication ou attestation.
      - name: Build + signature du plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew buildPlugin signPlugin verifyPluginSignature

      # Sélectionne l'artefact réellement distribué : le zip signé s'il existe,
      # sinon le zip simple. Sert à la fois pour la GitHub Release et pour que
      # l'utilisateur télécharge exactement ce qui a été attesté.
      - name: Identifier l'artefact distribué
        id: artifact
        # Sélection ancrée sur la version du tag (et non sur "le premier zip
        # trouvé") : déterministe même si le dossier contient d'anciens builds.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ARTIFACT=$(ls build/distributions/*-"${VERSION}"-signed.zip 2>/dev/null | head -1 || true)
          if [ -n "$ARTIFACT" ]; then
            echo "Plugin signé : $ARTIFACT"
          else
            ARTIFACT=$(ls build/distributions/*-"${VERSION}".zip | head -1)
            echo "::warning::Plugin NON signé (secrets de signature absents) : $ARTIFACT"
          fi
          echo "path=$ARTIFACT" >> "$GITHUB_OUTPUT"

      # Attestation de provenance SLSA : lie cryptographiquement le zip livré au
      # commit, au workflow et au runner qui l'ont produit. N'importe qui peut
      # ensuite vérifier une release (même téléchargée du Marketplace) avec :
      #   gh attestation verify rulescribe-X.Y.Z.zip \
      #     --repo Mrodrigue14/RuleScribe-plugin-for-kraken-rules
      # Un zip uploadé hors pipeline échoue à cette vérification.
      - name: Attester la provenance du build (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.artifact.outputs.path }}

      # SBOM CycloneDX de l'artefact livré (périmètre runtimeClasspath, cf.
      # build.gradle.kts). Complémentaire du rapport OWASP : celui-ci est un
      # VERDICT daté qui se périme au prochain CVE publié, le SBOM est un
      # INVENTAIRE durable et lisible par machine, qui permet à un utilisateur
      # de rescanner lui-même en continu sans dépendre de notre calendrier.
      - name: Générer le SBOM
        run: ./gradlew cyclonedxDirectBom

      # Attesté, donc lié cryptographiquement au zip : le SBOM se vérifie avec
      # le même `gh attestation verify` que la provenance.
      - name: Attester le SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-path: ${{ steps.artifact.outputs.path }}
          sbom-path: build/reports/cyclonedx-direct/rulescribe-sbom.json

      # Rôle LECTEUR de la stratégie OWASP "single updater + readers" : on
      # restaure la base NVD pré-construite depuis la release `nvd-cache`
      # (maintenue par le workflow dependency-check), puis on scanne avec
      # autoUpdate DÉSACTIVÉ → aucun appel au NVD, donc rapide et fiable.
      # Si l'archive n'existe pas encore (bootstrap), on retombe sur une mise à
      # jour complète (lente) pour ne pas bloquer la release.
      # Placé AVANT la publication : si le scan échoue, rien n'est publié.
      - name: Rapport OWASP Dependency-Check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p ~/.gradle/dependency-check-data
          if gh release download nvd-cache --pattern nvd-data.zip \
               --output /tmp/nvd-data.zip --clobber 2>/dev/null; then
            unzip -q -o /tmp/nvd-data.zip -d ~/.gradle/dependency-check-data
            rm -f /tmp/nvd-data.zip
            echo "Base NVD restaurée depuis nvd-cache → scan sans mise à jour."
            ./gradlew dependencyCheckAnalyze -PodcAutoUpdate=false
          else
            echo "Archive nvd-cache absente → mise à jour NVD complète (lente)."
            ./gradlew dependencyCheckAnalyze
          fi
          cp build/reports/dependency-check-report.html "dependency-check-report-${VERSION}.html"

      # publishPlugin déclenche signPlugin en amont : si les trois secrets de
      # signature existent, l'artefact publié est signé (l'IDE peut vérifier son
      # authenticité). S'ils sont absents, signPlugin est sauté et la
      # publication se fait sans signature — aucune régression.
      - name: Publier sur le JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin

      - name: Créer la GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # TAG/COMMIT passés par env puis référencés comme variables shell :
        # jamais interpolés via ${{ }} dans le script (pas d'injection).
        # Notes = bloc <change-notes> de plugin.xml + section OWASP prouvant
        # que le rapport joint est bien celui de cette release (version,
        # commit, empreinte SHA-256).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          ARTIFACT: ${{ steps.artifact.outputs.path }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          REPORT="dependency-check-report-${VERSION}.html"
          SHA=$(sha256sum "$REPORT" | awk '{print $1}')

          SBOM="rulescribe-sbom-${VERSION}.json"
          cp build/reports/cyclonedx-direct/rulescribe-sbom.json "$SBOM"
          SBOM_COMPONENTS=$(python3 -c "import json,sys; print(len(json.load(open(sys.argv[1]))\
            .get('components', [])))" "$SBOM")

          # Certificat de signature publié avec la release : sans lui, personne
          # ne peut vérifier la signature du zip, et la section « verify it
          # yourself » de SECURITY.md promettrait plus qu'elle ne permet.
          # Un certificat est du matériel PUBLIC — seule la clé privée est
          # secrète, et elle ne quitte jamais les secrets GitHub.
          CERT=""
          CERT_FP=""
          if [ -n "${CERTIFICATE_CHAIN:-}" ]; then
            CERT="rulescribe-signing-certificate.crt"
            printf '%s' "$CERTIFICATE_CHAIN" > "$CERT"
            CERT_FP=$(openssl x509 -in "$CERT" -noout -fingerprint -sha256 \
              | cut -d= -f2)
          fi

          # Notes de version depuis plugin.xml (sinon en-tête minimal).
          if ! python3 .github/scripts/extract-notes.py "$VERSION" > RELEASE_NOTES.md || [ ! -s RELEASE_NOTES.md ]; then
            printf 'RuleScribe %s\n' "$VERSION" > RELEASE_NOTES.md
          fi

          # Section OWASP : preuve de correspondance rapport <-> release.
          # (echos indentés pour YAML ; le contenu markdown, lui, reste propre.)
          {
            echo ""
            echo "---"
            echo ""
            echo "## OWASP Dependency-Check report"
            echo ""
            echo "The dependency vulnerability scan for **this exact release** is attached: \`$REPORT\`."
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Version | \`$VERSION\` |"
            echo "| Commit | \`$COMMIT\` |"
            echo "| Report SHA-256 | \`$SHA\` |"
            echo ""
            echo "Result: **0 vulnerable dependencies** — the shipped artifact bundles no third-party libraries (scan scoped to the runtime classpath). Generated by this release's CI run from the tagged commit above."
            echo ""
            echo "Verify the attached file matches this release:"
            echo ""
            echo '```'
            echo "sha256sum $REPORT   # must equal the SHA-256 above"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## Software Bill of Materials"
            echo ""
            echo "\`$SBOM\` (CycloneDX 1.6) lists what the shipped artifact contains: **$SBOM_COMPONENTS third-party components**, scoped to the runtime classpath like the scan above."
            echo ""
            echo "The OWASP report is a **verdict** — accurate on the day it was produced, and it ages as new CVEs are published. The SBOM is an **inventory**: it does not age, and it lets you re-scan this release against your own vulnerability feed at any time, without waiting on us."
            echo ""
            echo "It is attested, so it is bound to this exact artifact:"
            echo ""
            echo '```'
            echo "gh attestation verify $(basename "$ARTIFACT") \\"
            echo "  --repo $GITHUB_REPOSITORY --predicate-type https://cyclonedx.org/bom"
            echo '```'
          } >> RELEASE_NOTES.md

          # Section signature : le certificat public permet de vérifier le zip,
          # et son empreinte permet de constater qu'il s'agit bien de la même
          # clé de publication que les releases précédentes.
          if [ -n "$CERT" ]; then
            {
              echo ""
              echo "---"
              echo ""
              echo "## Plugin signature"
              echo ""
              echo "The published artifact is signed. The publisher certificate is attached as \`$CERT\` so you can verify the signature yourself."
              echo ""
              echo "| Field | Value |"
              echo "| ----- | ----- |"
              echo "| Certificate SHA-256 | \`$CERT_FP\` |"
              echo ""
              echo "The fingerprint is identical across releases signed with the same key: a change means the publishing identity changed, and would be announced."
              echo ""
              echo "Verify with JetBrains' [marketplace-zip-signer](https://github.com/JetBrains/marketplace-zip-signer):"
              echo ""
              echo '```'
              echo "java -jar marketplace-zip-signer-cli.jar verify \\"
              echo "  -in $(basename "$ARTIFACT") -cert $CERT"
              echo '```'
            } >> RELEASE_NOTES.md
          fi

          echo "--- Release notes ---"; cat RELEASE_NOTES.md
          # shellcheck disable=SC2086 — $CERT est vide si non signé, et on veut
          # alors qu'il disparaisse de la liste d'assets plutôt qu'un "".
          gh release create "$TAG" \
            "$ARTIFACT" \
            "$REPORT" \
            "$SBOM" \
            $CERT \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
