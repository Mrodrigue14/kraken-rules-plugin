name: Publish

# Publie le plugin sur le JetBrains Marketplace ET crée une GitHub Release,
# déclenché par un tag de version (ex. v0.5.8). Chaque tag = une release
# publique intentionnelle.
#
# Prérequis : secret JETBRAINS_MARKETPLACE_TOKEN (Marketplace → My Tokens).
# Flux type : bumper `version` dans build.gradle.kts → commit →
#   git tag v0.5.8 && git push origin v0.5.8
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# contents: write pour créer la GitHub Release. Le token Marketplace, lui,
# passe par un secret dédié (PUBLISH_TOKEN), jamais par le GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  publish:
    name: Publier (Marketplace + GitHub Release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (cache en lecture seule)
        uses: gradle/actions/setup-gradle@v6
        with:
          # Ne pas écrire de cache Gradle ici (cf. build.yml seul écrivain) —
          # préserve le budget de cache pour le cache NVD.
          cache-read-only: true

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      # Garde-fou : le tag (sans "v") doit correspondre à la version déclarée
      # dans build.gradle.kts, pour éviter de publier une version incohérente.
      # Ignoré lors d'un déclenchement manuel (pas de tag).
      - name: Vérifier la cohérence tag / version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILE_VERSION=$(grep -oE 'version = "[^"]+"' build.gradle.kts | head -1 | sed -E 's/version = "([^"]+)"/\1/')
          TAG_VERSION="${TAG#v}"
          echo "Tag: $TAG_VERSION  |  build.gradle.kts: $FILE_VERSION"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Le tag ($TAG_VERSION) ne correspond pas à la version de build.gradle.kts ($FILE_VERSION)."
            exit 1
          fi

      - name: Tests + vérification (ne publie pas si ça casse)
        run: ./gradlew test verifyPluginConfiguration

      - name: Build du plugin
        run: ./gradlew buildPlugin

      # Cache de la base NVD (partagé avec le workflow dependency-check) pour
      # que le scan ci-dessous soit rapide et fiable.
      - name: Cache de la base NVD
        uses: actions/cache@v6
        with:
          path: ~/.gradle/dependency-check-data
          key: nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-${{ runner.os }}-

      # Rapport OWASP généré depuis CE commit taggé : c'est le rapport de
      # cette release exacte. Placé AVANT la publication : si le scan échoue,
      # rien n'est publié (pas de release partielle).
      - name: Rapport OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          ./gradlew dependencyCheckAnalyze
          cp build/reports/dependency-check-report.html "dependency-check-report-${VERSION}.html"

      - name: Publier sur le JetBrains Marketplace
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
        run: ./gradlew publishPlugin

      - name: Créer la GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        # TAG/COMMIT passés par env puis référencés comme variables shell :
        # jamais interpolés via ${{ }} dans le script (pas d'injection).
        # Notes = bloc <change-notes> de plugin.xml + section OWASP prouvant
        # que le rapport joint est bien celui de cette release (version,
        # commit, empreinte SHA-256).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          REPORT="dependency-check-report-${VERSION}.html"
          SHA=$(sha256sum "$REPORT" | awk '{print $1}')

          # Notes de version depuis plugin.xml (sinon en-tête minimal).
          if ! python3 .github/scripts/extract-notes.py "$VERSION" > RELEASE_NOTES.md || [ ! -s RELEASE_NOTES.md ]; then
            printf 'RuleScribe %s\n' "$VERSION" > RELEASE_NOTES.md
          fi

          # Section OWASP : preuve de correspondance rapport <-> release.
          # (echos indentés pour YAML ; le contenu markdown, lui, reste propre.)
          {
            echo ""
            echo "---"
            echo ""
            echo "## OWASP Dependency-Check report"
            echo ""
            echo "The dependency vulnerability scan for **this exact release** is attached: \`$REPORT\`."
            echo ""
            echo "| Field | Value |"
            echo "| ----- | ----- |"
            echo "| Version | \`$VERSION\` |"
            echo "| Commit | \`$COMMIT\` |"
            echo "| Report SHA-256 | \`$SHA\` |"
            echo ""
            echo "Result: **0 vulnerable dependencies** — the shipped artifact bundles no third-party libraries (scan scoped to the runtime classpath). Generated by this release's CI run from the tagged commit above."
            echo ""
            echo "Verify the attached file matches this release:"
            echo ""
            echo '```'
            echo "sha256sum $REPORT   # must equal the SHA-256 above"
            echo '```'
          } >> RELEASE_NOTES.md

          echo "--- Release notes ---"; cat RELEASE_NOTES.md
          gh release create "$TAG" \
            build/distributions/*.zip \
            "$REPORT" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md
