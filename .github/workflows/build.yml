name: Build

on:
  push:
    branches: [ main ]
    # Ne pas lancer le build/les scans pour des changements purement
    # documentaires (README, ROADMAP, LICENSE…) : ils ne peuvent pas casser
    # le code ni introduire de vulnérabilité. Un push qui touche AUSSI du code
    # déclenche quand même le workflow.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  workflow_dispatch:

# Annule le run devenu obsolète quand un nouveau push arrive sur la même ref
# (event_name dans la clé pour qu'un run planifié n'annule pas un run de push).
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Seul workflow autorisé à ÉCRIRE le cache Gradle (cf. composite action).
      - name: Setup Java + Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: "false"

      - name: Tests
        run: ./gradlew test

      - name: Build du plugin
        run: ./gradlew buildPlugin

      - name: Vérification du plugin (structure zip)
        run: ./gradlew verifyPluginConfiguration

      - name: Publier l'artefact
        uses: actions/upload-artifact@v7
        with:
          name: rulescribe
          path: build/distributions/*.zip
          retention-days: 30

      - name: Rapport de tests (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7
