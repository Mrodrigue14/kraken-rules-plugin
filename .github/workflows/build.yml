name: Build

on:
  push:
    branches: [ main ]
    # Ne pas lancer le build/les scans pour des changements purement
    # documentaires (README, ROADMAP, LICENSE…) : ils ne peuvent pas casser
    # le code ni introduire de vulnérabilité. Un push qui touche AUSSI du code
    # déclenche quand même le workflow.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (avec cache)
        uses: gradle/actions/setup-gradle@v6

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Tests
        run: ./gradlew test

      - name: Build du plugin
        run: ./gradlew buildPlugin

      - name: Vérification du plugin (structure zip)
        run: ./gradlew verifyPluginConfiguration

      - name: Publier l'artefact
        uses: actions/upload-artifact@v7
        with:
          name: rulescribe
          path: build/distributions/*.zip

      - name: Rapport de tests (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: build/reports/tests/test/
