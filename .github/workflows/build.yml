name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (avec cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Tests
        run: ./gradlew test

      - name: Build du plugin
        run: ./gradlew buildPlugin

      - name: Vérification du plugin (structure zip)
        run: ./gradlew verifyPluginConfiguration

      - name: Publier l'artefact
        uses: actions/upload-artifact@v4
        with:
          name: rulescribe
          path: build/distributions/*.zip

      - name: Rapport de tests (en cas d'échec)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test/

  dependency-check:
    name: Vulnérabilités des dépendances (OWASP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle (avec cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Rendre gradlew exécutable
        run: chmod +x gradlew

      - name: Scan des dépendances (échoue si CVE >= 7.0)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      - name: Publier le rapport
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
