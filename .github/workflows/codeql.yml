name: "CodeQL"

on:
  push:
    branches: [ main ]
    # Changements purement documentaires : pas d'analyse de code nécessaire.
    # Le scan hebdomadaire (schedule) tourne de toute façon.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: autobuild
          # Suite security-and-quality + exclusion du code généré.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
          # On n'upload pas directement : on filtre d'abord le code généré.
          upload: false
          output: sarif-results

      # paths-ignore n'a aucun effet pour les langages compilés : on retire donc
      # les alertes du parseur généré (src/main/gen) du SARIF avant l'upload.
      # Filtrage via jq (autonome, sans nom de fichier en dur ni action tierce).
      - name: Filtrer le code généré du SARIF
        run: |
          set -euo pipefail
          for sarif in sarif-results/*.sarif; do
            echo "Filtrage de $sarif"
            jq '.runs |= map(.results |= map(select(
                  [ .locations[]?.physicalLocation.artifactLocation.uri // "" ]
                  | any(contains("src/main/gen/")) | not )))' \
               "$sarif" > "$sarif.tmp"
            mv "$sarif.tmp" "$sarif"
          done

      - name: Upload du SARIF filtré
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: "/language:java-kotlin"
