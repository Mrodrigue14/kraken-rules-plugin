name: "CodeQL"

on:
  push:
    branches: [ main ]
    # Changements purement documentaires : pas d'analyse de code nécessaire.
    # Le scan hebdomadaire (schedule) tourne de toute façon.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  # PAS de paths-ignore ici : `Analyze (java-kotlin)` est un check REQUIS par la
  # protection de `main`. Skippé, il ne rapporte aucun statut et bloque la PR
  # indéfiniment. Le filtre reste sur `push`, où il n'y a rien à réanalyser.
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # Composite action plutôt qu'un setup-java isolé : elle apporte le cache
      # Gradle. `build-mode: autobuild` compile réellement le plugin, donc sans
      # cache chaque analyse re-télécharge le SDK IntelliJ (~1 Go) — d'où 4 min
      # ici contre 1 min pour le workflow Build. En lecture seule : ce workflow
      # consomme le cache écrit par build.yml sans gonfler le budget du dépôt.
      - name: Setup Java + Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: autobuild
          # Suite security-and-quality + exclusion du code généré.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
          # On n'upload pas directement : on filtre d'abord le code généré.
          upload: false
          output: sarif-results

      # paths-ignore n'a aucun effet pour les langages compilés : on retire donc
      # les alertes du parseur généré (src/main/gen) du SARIF avant l'upload.
      # Filtrage via jq (autonome, sans nom de fichier en dur ni action tierce).
      - name: Filtrer le code généré du SARIF
        run: |
          set -euo pipefail
          for sarif in sarif-results/*.sarif; do
            echo "Filtrage de $sarif"
            jq '.runs |= map(.results |= map(select(
                  [ .locations[]?.physicalLocation.artifactLocation.uri // "" ]
                  | any(contains("src/main/gen/")) | not )))' \
               "$sarif" > "$sarif.tmp"
            mv "$sarif.tmp" "$sarif"
          done

      - name: Upload du SARIF filtré
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results
          category: "/language:java-kotlin"
