name: "CodeQL"

on:
  push:
    branches: [ main ]
    # Changements purement documentaires : pas d'analyse de code nécessaire.
    # Le scan hebdomadaire (schedule) tourne de toute façon.
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'NOTICE'
      - 'third_party/**'
      - '.gitignore'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: autobuild
          # Suite security-and-quality + exclusion du code généré.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
          # On n'upload pas directement : on filtre d'abord le code généré.
          upload: false
          output: sarif-results

      # paths-ignore ne filtre pas le code généré pour les langages compilés :
      # on retire donc les alertes de src/main/gen du SARIF avant l'upload.
      - name: Filtrer le code généré du SARIF
        uses: advanced-security/filter-sarif@v1
        with:
          patterns: |
            -src/main/gen/**
          input: sarif-results/java-kotlin.sarif
          output: sarif-results/java-kotlin.sarif

      - name: Upload du SARIF filtré
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif-results/java-kotlin.sarif
          category: "/language:java-kotlin"
