name: Dependency check (OWASP)

# Rôle : UPDATER de la stratégie "single updater + readers" recommandée par
# OWASP pour cacher la base H2 (odc.mv.db). Ce job (planifié + manuel) met à
# jour la base NVD, scanne, puis ARCHIVE le `data` dir dans la release
# `nvd-cache`. Les jobs lecteurs (ex. publish) restaurent cet artefact et
# scannent avec autoUpdate désactivé → aucun appel NVD, donc rapides et fiables.
#
# Hors chemin critique des push/PR : construire la base NVD 2.0 est long et n'a
# pas à bloquer les commits. Push/PR restent couverts par CodeQL et Dependabot.
on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:
    inputs:
      seed_data_url:
        description: "URL d'un zip de base NVD pré-construite (bootstrap ponctuel)"
        required: false
        default: ""

# contents: write pour publier l'archive de la base NVD dans la release nvd-cache.
permissions:
  contents: write

env:
  NVD_CACHE_TAG: nvd-cache
  NVD_CACHE_ASSET: nvd-data.zip

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-check:
    name: Mise à jour + scan OWASP
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java + Gradle
        uses: ./.github/actions/setup-java-gradle

      # Restaure la base NVD précédente (release nvd-cache) ou un seed manuel,
      # pour une mise à jour INCRÉMENTALE au lieu d'un téléchargement complet.
      # Les mtimes sont préservés par unzip (important pour la validité du
      # sous-dossier `cache`, cf. doc OWASP).
      - name: Restaurer la base NVD existante
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SEED_URL: ${{ github.event.inputs.seed_data_url }}
        run: |
          set -uo pipefail
          mkdir -p ~/.gradle/dependency-check-data
          if [ -n "${SEED_URL:-}" ]; then
            echo "Bootstrap depuis l'URL fournie."
            curl -fsSL "$SEED_URL" -o /tmp/nvd-data.zip || true
          else
            echo "Restauration depuis la release $NVD_CACHE_TAG (si elle existe)."
            gh release download "$NVD_CACHE_TAG" --pattern "$NVD_CACHE_ASSET" \
              --output /tmp/nvd-data.zip --clobber || echo "(aucune archive existante)"
          fi
          if [ -f /tmp/nvd-data.zip ]; then
            unzip -q -o /tmp/nvd-data.zip -d ~/.gradle/dependency-check-data && rm -f /tmp/nvd-data.zip
          fi

      - name: Mise à jour NVD + scan (échoue si CVE >= 7.0)
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./gradlew dependencyCheckAnalyze

      # Archive la base à jour et la publie pour les jobs lecteurs. Ne s'exécute
      # que si le scan a réussi (base complète) — on ne publie jamais une base
      # partielle. zip préserve les mtimes.
      - name: Archiver et publier la base NVD (release nvd-cache)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -d ~/.gradle/dependency-check-data ]; then
            echo "Pas de data dir à archiver."; exit 0
          fi
          ( cd ~/.gradle/dependency-check-data && zip -r -q "$GITHUB_WORKSPACE/$NVD_CACHE_ASSET" . )
          gh release view "$NVD_CACHE_TAG" >/dev/null 2>&1 \
            || gh release create "$NVD_CACHE_TAG" --title "NVD data cache (internal)" \
                 --notes "OWASP dependency-check H2 database, refreshed automatically. Not a plugin release." \
                 --prerelease
          gh release upload "$NVD_CACHE_TAG" "$NVD_CACHE_ASSET" --clobber

      - name: Publier le rapport
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: dependency-check-report
          path: build/reports/dependency-check-report.html
          retention-days: 30
