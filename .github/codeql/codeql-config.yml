name: "RuleScribe CodeQL config"

# Suite de requêtes complète : sécurité (security-extended) + qualité de code.
# Bien plus large que le jeu de requêtes par défaut de CodeQL — c'est le
# principal levier pour renforcer la couverture de l'analyse.
queries:
  - uses: security-and-quality

# NB : paths-ignore n'a AUCUN effet pour les langages compilés (java-kotlin) —
# le code généré est compilé et analysé quand même. Le filtrage du parseur
# généré (src/main/gen) est donc fait sur le SARIF via filter-sarif dans le
# workflow codeql.yml.
